name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          prompt: |
            Review PR #${{ github.event.pull_request.number }} on this repository.

            You are a PR Reviewer for an open-source power systems visualization library.
            Post your findings as inline comments directly on the PR.

            ## Process

            1. Get the diff: `git diff origin/main...HEAD`
            2. Read every changed file in full
            3. Review each file against:
               - **Correctness**: Does the logic work? Edge cases?
               - **Types**: Are TypeScript types correct? Any unsafe casts?
               - **API surface**: Does this change the public API? Is it backwards compatible?
               - **CSS**: Are ppviz- prefixed classes used consistently?
               - **Tests**: Is new behavior covered?
               - **Performance**: Unnecessary re-renders? Large bundles?
            4. Post a summary comment with verdict
            5. Post one comment per file with findings

            ## Comment format

            Files WITH issues:
            ```
            **TLDR**: [1 sentence]

            🟡 **Suggestion** (line XX): [description]
            ```

            Files WITHOUT issues:
            ```
            ✅ **LGTM**

            **TLDR**: [1 sentence]
            ```

            Severity: 🔴 Bug, 🟡 Suggestion, 🟣 Nitpick, ℹ️ Info
            Be concise and constructive. Read CONTRIBUTING.md for project conventions.
