name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build library
        run: cd frontend && npx vite build --mode lib

      - name: Install semantic-release
        run: npm install --no-save semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/exec

      - name: Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  publish-npm:
    needs: release
    if: needs.release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci
      - run: cd frontend && npx vite build --mode lib

      - name: Set version
        run: cd frontend && npm version ${{ needs.release.outputs.version }} --no-git-tag-version

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > frontend/.npmrc
          cd frontend && npm publish --access public
          rm -f .npmrc

  publish-pypi:
    needs: release
    if: needs.release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Build frontend into pandapower_viz/_static/
      - run: cd frontend && npm ci
      - run: cd frontend && npx vite build
      - run: cd frontend && npx vite build --mode widget

      # Update version in pyproject.toml
      - name: Set version
        run: sed -i "s/version = \".*\"/version = \"${{ needs.release.outputs.version }}\"/" pyproject.toml

      # Build and publish
      - run: pip install build twine
      - run: python -m build
      - name: Publish to PyPI
        run: twine upload dist/* -u __token__ -p ${{ secrets.PYPI_API_TOKEN }}
